{% load static %}<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltStream — Вход в систему</title>
    <style>
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #242424;
            --bg-tertiary: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #999999;
            --accent: #2ecc71;
            --accent-hover: #27ae60;
            --danger: #ff5252;
            --border: #404040;
            --input-bg: #1f1f1f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 20% 30%, rgba(46,204,113,0.08), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(46,204,113,0.05), transparent 60%),
                var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2.25rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-brand {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .login-logo {
            font-size: 2.25rem;
            margin-bottom: 0.5rem;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.35rem;
        }

        .login-subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .login-form { display: flex; flex-direction: column; gap: 1rem; }

        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

        .form-label {
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        .form-input {
            padding: 0.75rem 0.95rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-input::placeholder { color: var(--text-secondary); opacity: 0.7; }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.18);
            background: #1c1c1c;
        }

        .login-error {
            background: rgba(255, 82, 82, 0.12);
            border: 1px solid rgba(255, 82, 82, 0.4);
            color: var(--danger);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            text-align: center;
        }

        .login-btn {
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            padding: 0.85rem 1rem;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
            letter-spacing: 0.02em;
        }

        .login-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .login-btn:active { transform: translateY(0); }

        .login-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .login-footer .accent { color: var(--accent); font-weight: 600; }

        body.light-theme {
            --bg-primary: #f5f6f8;
            --bg-secondary: #ffffff;
            --bg-tertiary: #eceef2;
            --text-primary: #1a1a1a;
            --text-secondary: #5a6270;
            --accent: #27ae60;
            --accent-hover: #2ecc71;
            --danger: #e74c3c;
            --border: #d1d5db;
            --input-bg: #ffffff;
        }

        body.light-theme .login-card {
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
        }

        body.light-theme .form-input:focus { background: #ffffff; }

        body.light-theme .login-btn { color: #ffffff; }

        @media (max-width: 480px) {
            .login-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <div class="login-logo">⚡</div>
            <h1 class="login-title">VoltStream Designer</h1>
            <p class="login-subtitle">Авторизуйтесь, чтобы продолжить</p>
        </div>

        {% if error %}
            <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="post" class="login-form" novalidate>
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div class="form-group">
                <label class="form-label" for="login-username">Логин</label>
                <input class="form-input" type="text" id="login-username" name="username"
                       autocomplete="username" autofocus required placeholder="ваш_логин">
            </div>

            <div class="form-group">
                <label class="form-label" for="login-password">Пароль</label>
                <input class="form-input" type="password" id="login-password" name="password"
                       autocomplete="current-password" required placeholder="••••••••">
            </div>

            <button class="login-btn" type="submit">Войти в систему</button>
        </form>

        <div class="login-footer">
            <span class="accent">VoltStream</span> &middot; Конструктор электрических схем
        </div>
    </div>

    <script>
        (function () {
            try {
                if (localStorage.getItem('voltstream_theme') === 'light') {
                    document.body.classList.add('light-theme');
                }
            } catch (e) {}
        })();
    </script>
</body>
</html>
